<!DOCTYPE html>
<html>
<head>
    <title>Daftar Produk</title>
</head>
<body>
    <h1>Daftar Produk</h1>
    <ul>
        {% for produk in produk_list %}
        <li>
            <a href="/produk/{{ produk.id }}/">{{ produk.nama }}</a> - {{ produk.harga }}
        </li>
        {% endfor %}
    </ul>
    <a href="/">Kembali ke Homepage</a>
</body>
</html>
